version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: replaycoach-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: replaycoach
      POSTGRES_PASSWORD: replaycoach_dev
      POSTGRES_DB: replaycoach
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U replaycoach']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: replaycoach-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  livekit:
    image: livekit/livekit-server:latest
    container_name: replaycoach-livekit
    restart: unless-stopped
    ports:
      - '7880:7880'
      - '7881:7881'
      - '7882:7882/udp'
    command: --dev --keys devkey:secret
    environment:
      - LIVEKIT_KEYS=devkey:secret

volumes:
  postgres_data:
  redis_data:
